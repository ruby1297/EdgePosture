<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>辦公室防久坐小幫手</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
  </head>
  <body>
    <div id="dashboard-container" class="container">
      <h1 id="current-time">00:00:00</h1>
      <p style="font-size: 1.2rem; color: #666;">距離下次伸展休息還有：</p>
      <h2 id="time-left">60:00</h2>
    </div>

    <div id="reminder-modal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <h2>起來動一動！</h2>
        <p>你已經坐了 1 小時，請站起來伸展</p>
        <div class="btn-group">
          <button class="btn-primary" onclick="startExercise()">開始運動</button>
          <button class="btn-secondary" onclick="snooze()">稍後提醒</button>
        </div>
      </div>
    </div>

    <div id="yoga-container" class="container" style="display: none">
      <h2 id="instruction-text">請稍候...</h2>
      
      <div class="yoga-display">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
        <div class="image-wrapper">
          <img id="pose-image" src="" alt="示範動作" style="display:none;" />
        </div>
      </div>
      
      <div id="label-container"></div>
    </div>

    <div id="game-container" class="container" style="display: none">
      <h2>挑戰成功！來玩場遊戲放鬆一下</h2>
      <iframe
        src="./nonograms/index.html"
        width="100%"
        height="600px"
        frameborder="0"
      ></iframe>
      <button class="btn-primary" style="margin-top: 20px;" onclick="backToWork()">結束休息，開始工作並重新計時</button>
    </div>

    <script src="yoga.js"></script>
    <script src="reminder.js"></script>
  </body>
</html>
